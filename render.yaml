services:
  - type: web
    name: ecmo-research-dashboard
    env: python
    plan: free
    healthCheckPath: /healthz
    buildCommand: "python3 ecmo_seed_ranker.py && python3 build_dashboard_bundle.py"
    startCommand: "python3 research_assistant_server.py"
    envVars:
      - key: AI_PROVIDER
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: AUTO_RESEARCH_ENABLED
        value: "1"
      - key: AUTO_RESEARCH_INTERVAL_SECONDS
        value: "3600"
      - key: AUTO_RESEARCH_LLM_ENABLED
        value: "1"
      - key: AUTO_RESEARCH_PAGE_SIZE
        value: "24"
      - key: ECMO_DASHBOARD_HOST
        value: "0.0.0.0"
      - key: ECMO_ALLOWED_ORIGINS
        value: "https://ecmo-research-dashboard.onrender.com"
      - key: ECMO_BASIC_AUTH_USER
        sync: false
      - key: ECMO_BASIC_AUTH_PASSWORD
        sync: false
      - key: ECMO_APP_LOGIN_USERS_JSON
        sync: false
      - key: ECMO_APP_LOGIN_USER
        sync: false
      - key: ECMO_APP_LOGIN_PASSWORD
        sync: false
      - key: ECMO_SESSION_SECRET
        sync: false
      - key: ECMO_SESSION_TTL_HOURS
        value: "24"
      - key: DEEPSEEK_API_KEY
        sync: false
