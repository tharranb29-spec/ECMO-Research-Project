services:
  - type: web
    name: ecmo-research-dashboard
    env: python
    plan: free
    buildCommand: "python3 ecmo_seed_ranker.py && python3 build_dashboard_bundle.py"
    startCommand: "python3 research_assistant_server.py"
    envVars:
      - key: AI_PROVIDER
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: AUTO_RESEARCH_ENABLED
        value: "1"
      - key: AUTO_RESEARCH_INTERVAL_SECONDS
        value: "21600"
      - key: ECMO_DASHBOARD_HOST
        value: "0.0.0.0"
      - key: DEEPSEEK_API_KEY
        sync: false
